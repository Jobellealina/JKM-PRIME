<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JKM Prime Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link rel="icon" type="image/png" href="logo.png">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
     background: linear-gradient(
    135deg,
    #e8eaff,
    #d6dcff,
    #e3e8ff,
    #c9d4ff);
    font-family:Arial;
}

/* MAIN CARD */
.login-wrapper{
    width:900px;
    max-width:95%;
    height:550px;
    display:flex;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(0,0,0,0.2);
    background:white;
}

/* LEFT */
.left-side{
    flex:1;
    background:url("logo.png") center/cover no-repeat;
    position:relative;
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    padding:30px;
}

.left-overlay{
    position:absolute;
    top:0;left:0;
    width:100%;
    height:100%;
    background:rgba(229, 212, 242, 0.6);
}

.left-content{
    position:relative;
    z-index:2;
}

/* RIGHT */
.right-side{
    flex:1;
    padding:50px 40px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.right-side h3{
    font-weight:bold;
    margin-bottom:25px;
    color:#0b1f4d;
}

.form-control{
    border-radius:10px;
    padding:12px;
}

.btn-login{
    background:#0b1f4d;
    color:white;
    font-weight:bold;
    padding:12px;
    border-radius:10px;
}

.btn-login:hover{
    background:#6610f2;
}

.input-group-text{
    cursor:pointer;
    border-radius:0 10px 10px 0;
}

/* =========================
CIRCULAR CMYK LOADER (NO BACKGROUND)
========================= */
.loader-overlay{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    display:none;
    z-index:9999;
}

/* circular ring */
.loader-ring{
    width:90px;
    height:90px;
    border-radius:50%;
    position:relative;
    animation:spin 1.2s linear infinite;
}

/* 4 CMYK dots in circle */
.dot{
    width:18px;
    height:18px;
    border-radius:50%;
    position:absolute;
}

/* positions */
.dot:nth-child(1){ background:cyan; top:0; left:50%; transform:translateX(-50%); }
.dot:nth-child(2){ background:magenta; right:0; top:50%; transform:translateY(-50%); }
.dot:nth-child(3){ background:yellow; bottom:0; left:50%; transform:translateX(-50%); }
.dot:nth-child(4){ background:black; left:0; top:50%; transform:translateY(-50%); }

@keyframes spin{
    from{ transform:translate(-50%,-50%) rotate(0deg); }
    to{ transform:translate(-50%,-50%) rotate(360deg); }
}

@media (max-width: 768px){

    body{
        padding:15px;
    }

    .login-wrapper{
        flex-direction:column;
        height:auto;
        border-radius:15px;
    }

    .left-side{
        display:none; /* hide image on phone for better UI */
    }

    .right-side{
        padding:30px 20px;
    }

    .right-side h3{
        text-align:center;
        font-size:20px;
    }

    .form-control{
        font-size:14px;
        padding:10px;
    }

    .btn-login{
        padding:10px;
        font-size:15px;
    }

    .input-group-text{
        padding:0 12px;
    }
}

@media (max-width: 480px){

    .login-wrapper{
        width:100%;
        margin:10px;
    }

    .right-side{
        padding:20px 15px;
    }

    h3{
        font-size:18px;
    }

    label{
        font-size:13px;
    }
}

/* DEFAULT (DESKTOP) */
.login-wrapper{
    width:900px;
    max-width:95%;
    height:550px;
    display:flex;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(0,0,0,0.2);
    background:white;
}

/* LEFT = LOGO AREA */
.left-side{
    flex:1;
    background:url("logo.png") center/cover no-repeat;
    position:relative;
}

/* RIGHT = LOGIN */
.right-side{
    flex:1;
    padding:50px 40px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

/* =========================
MOBILE FIX (IMPORTANT)
========================= */
@media (max-width: 768px){

    body{
        padding:15px;
    }

    .login-wrapper{
        flex-direction:column;
        height:auto;
    }

    /* 🔥 LOGO goes TOP */
    .left-side{
        height:180px;
        flex:none;
        background-size:contain;
        background-repeat:no-repeat;
        background-position:center;
        background-color:white;
    }

    /* LOGIN goes BOTTOM */
    .right-side{
        padding:25px 20px;
    }

    .right-side h3{
        text-align:center;
        font-size:20px;
    }

    .form-control{
        font-size:14px;
    }

    .btn-login{
        font-size:15px;
    }
}
</style>
</head>

<body>

<!-- LOADER (NO BACKGROUND) -->
<div class="loader-overlay" id="loader">
    <div class="loader-ring">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>
</div>

<div class="login-wrapper">

    <div class="left-side">
        <div class="left-overlay"></div>
    </div>

    <div class="right-side">

       <h3 class="text-center">JKM PRIME LOGIN</h3>


        <div class="mb-3">
            <label>Username</label>
            <input type="text" id="username" class="form-control">
        </div>

        <div class="mb-3">
            <label>Password</label>
            <div class="input-group">
                <input type="password" id="password" class="form-control">
                <span class="input-group-text" onclick="togglePass()">
                    <i class="fa fa-eye" id="eyeIcon"></i>
                </span>
            </div>
        </div>

        <button class="btn btn-login w-100" onclick="login()">Login</button>

    </div>

</div>

<script>

function togglePass(){
    let pass = document.getElementById("password");
    let icon = document.getElementById("eyeIcon");

    if(pass.type === "password"){
        pass.type = "text";
        icon.classList.replace("fa-eye","fa-eye-slash");
    }else{
        pass.type = "password";
        icon.classList.replace("fa-eye-slash","fa-eye");
    }
}

function login(){

let user = document.getElementById("username").value.trim();
let pass = document.getElementById("password").value.trim();

if(user === "JKM PRIME" && pass === "Jkm@2026"){

    localStorage.setItem("loggedIn","true");

    // SHOW CIRCULAR LOADER
    document.getElementById("loader").style.display = "block";

    setTimeout(()=>{
        window.location.href = "index.html";
    }, 2000);

}else{

    Swal.fire({
        icon: "error",
        title: "Login Failed",
        text: "Invalid username or password",
        confirmButtonColor: "#dc3545"
    });

}

}

document.addEventListener("keydown", function(event){
    if(event.key === "Enter"){
        login();
    }
});

</script>

</body>
</html>
